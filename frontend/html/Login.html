<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Nidhi Creation</title>
  <link rel="stylesheet" href="../css/Login_CSS.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="page-wrap">

    <div class="login-card">

      <!-- Brand -->
      <div class="brand">
        <span class="brand-name">Nidhi <em>Creation</em></span>
        <p class="brand-sub">Signboard Specialists, Ahmedabad</p>
      </div>

      <div class="divider"></div>

      <h1 class="card-title">Welcome</h1>
      <p class="card-hint">Enter your details to continue</p>

      <form id="loginForm" action="/login" method="POST" novalidate>

        <div class="field-group">
          <label for="name">Your Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="enter full name"
            autocomplete="name"
            required
          />
          <span class="field-error" id="nameError"></span>
        </div>

        <div class="field-group">
          <label for="phone">Phone Number</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="enter mobile number"
            autocomplete="tel"
            maxlength="15"
            required
          />
          <span class="field-error" id="phoneError"></span>
        </div>

        <div class="field-group">
          <label for="business">Business Name</label>
          <input
            type="text"
            id="business"
            name="business"
            placeholder="enter business name"
            autocomplete="organization"
            required
          />
          <span class="field-error" id="businessError"></span>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Continue</span>
        </button>

        <p class="form-note" id="formNote"></p>

      </form>

    </div>

  </div>

  <script src="../js/login.js"></script>
</body>
</html>
