<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Nidhi Creation</title>
  <link rel="stylesheet" href="../css/AdminLogin_CSS.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="page-wrap">
    <div class="login-card">

      <!-- Brand -->
      <div class="brand">
        <span class="brand-name">Nidhi <em>Creation</em></span>
        <p class="brand-sub">Admin Panel</p>
      </div>

      <div class="divider"></div>

      <h1 class="card-title">Admin Login</h1>
      <p class="card-hint">Restricted access — authorised personnel only</p>

      <form id="adminForm" action="/admin/login" method="POST" novalidate>

        <div class="field-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Admin username"
            autocomplete="username"
            required
          />
          <span class="field-error" id="usernameError"></span>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pass" id="togglePass" aria-label="Show password">
              <!-- Eye icon -->
              <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hidden by default) -->
              <svg id="eyeHide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Verify &amp; Enter</span>
        </button>

        <p class="form-note" id="formNote"></p>

      </form>

    </div>
  </div>

  <script src="../js/AdminLogin.js"></script>
</body>
</html>
