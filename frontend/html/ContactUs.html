<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us — Nidhi Creation</title>
  <link rel="stylesheet" href="../css/ContactUs_CSS.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="page-wrap">

    <div class="contact-wrapper">

      <div class="page-header">
        <span class="brand-name">Nidhi <em>Creation</em></span>
        <h1>Contact Us</h1>
        <p>Get in touch — we'll get back to you within 24 hours.</p>
      </div>

      <div class="contact-grid">

        <!-- RIGHT: Info + Map -->
        <div class="info-card">

          <h2>Our Details</h2>

          <div class="info-list">

            <div class="info-item">
              <div class="info-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.85a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"/></svg>
              </div>
              <div class="info-text">
                <span class="info-label">Phone</span>
                <!-- REPLACE with your actual phone number -->
                <a href="tel:+919876543210">+91 98765 43210</a>
              </div>
            </div>

            <div class="info-item">
              <div class="info-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <div class="info-text">
                <span class="info-label">Email</span>
                <!-- REPLACE with your actual email -->
                <a href="mailto:info@nidhicreation.in">info@nidhicreation.in</a>
              </div>
            </div>

            <div class="info-item">
              <div class="info-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </div>
              <div class="info-text">
                <span class="info-label">Address</span>
                <!-- REPLACE with your actual address -->
                <span>123, Signboard Market,<br/>Ahmedabad, Gujarat — 380001</span>
              </div>
            </div>

            <div class="info-item">
              <div class="info-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <div class="info-text">
                <span class="info-label">Working Hours</span>
                <span>Mon – Sat: 9:00 AM – 7:00 PM</span>
              </div>
            </div>

          </div>

          <!-- Google Map embed -->
          <!-- REPLACE the src URL with your actual Google Maps embed link:
               Go to maps.google.com → search your location → Share → Embed a map → copy the src URL -->
          <div class="map-wrap">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d235013.68396480644!2d72.43955645!3d23.0204978!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e848aba5bd449%3A0x4fcedd11614f6516!2sAhmedabad%2C%20Gujarat!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin"
              width="100%"
              height="100%"
              style="border:0;"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="Our Location">
            </iframe>
          </div>

        </div>

      </div>
    </div>
  </div>

  <!-- <script src="../js/ContactUs.js"></script> -->
</body>
</html>
